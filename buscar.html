<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Busqueda</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <style>
        body {
            background-color: #f0f2f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .main-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .form-card {
            max-width: 550px;
            width: 100%;
            border: none;
            border-radius: 20px;
            transition: all 0.3s ease-in-out;
        }

        .form-card:hover {
            transform: translateY(-5px);
        }

        .btn-custom {
            background-color: #4f46e5;
            color: white;
            border-radius: 10px;
            font-weight: 600;
            padding: 12px;
            transition: all 0.3s;
        }

        .btn-custom:hover {
            background-color: #4338ca;
            color: white;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
        }

        .form-label {
            font-weight: 600;
            color: #4b5563;
        }

        .form-control:focus {
            border-color: #a5b4fc;
            box-shadow: 0 0 0 0.25rem rgba(165, 180, 252, 0.25);
        }
    </style>
</head>

<body>

    <div class="container main-container">
        <div class="card form-card shadow-lg p-3">
            <div class="card-body">

                <div class="text-center mb-5">
                    <h2 class="fw-bold text-dark">Registro de Nuevo Usuario</h2>
                    <p class="text-muted">Por favor, completa los siguientes datos para continuar.</p>
                </div>

                <form action="resultados.php" method="GET">

                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label for="nombre" class="form-label">Nombre</label>
                            <input type="text" class="form-control form-control-lg" id="nombre" name="nombre"
                                placeholder="Ej. Juan" required>
                        </div>
                        <div class="col-md-6 mt-3 mt-md-0">
                            <label for="apellido" class="form-label">Apellido</label>
                            <input type="text" class="form-control form-control-lg" id="apellido" name="apellido"
                                placeholder="Ej. Pérez" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="edad" class="form-label">Edad (en años)</label>
                        <input type="number" class="form-control form-control-lg" id="edad" name="edad" placeholder="00"
                            min="1" max="120" required>
                    </div>

                    <div class="mb-5">
                        <label for="email" class="form-label">Correo Electrónico (Opcional)</label>
                        <div class="input-group">
                            <span class="input-group-text" id="basic-addon1">@</span>
                            <input type="email" class="form-control form-control-lg" id="email" name="email"
                                placeholder="juan.perez@ejemplo.com">
                        </div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-custom btn-lg shadow-sm">
                            Enviar Datos y Procesar
                        </button>
                    </div>

                    <div class="text-center mt-4">
                        <small class="text-muted">Tus datos están seguros con nosotros.</small>
                    </div>

                </form>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

</body>

</html>
