<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario GET Bootstrap 5</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">Búsqueda de Usuario</h4>
                    </div>
                    <div class="card-body">
                        <form action="buscar.php" method="GET">

                            <div class="mb-3">
                                <label for="query" class="form-label">Término de búsqueda</label>
                                <input type="text" class="form-control" id="query" name="query"
                                    placeholder="Ej: Juan Pérez" required>
                            </div>

                            <div class="mb-3">
                                <label for="categoria" class="form-label">Categoría</label>
                                <select class="form-select" id="categoria" name="categoria">
                                    <option value="todos" selected>Todos</option>
                                    <option value="alumnos">Alumnos</option>
                                    <option value="profesores">Profesores</option>
                                </select>
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary">Buscar</button>
                                <button type="reset" class="btn btn-outline-secondary">Limpiar</button>
                            </div>

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.min.js"></script>
</body>

</html>
