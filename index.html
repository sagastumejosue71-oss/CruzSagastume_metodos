<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset=" UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Tarea 10/04/2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .form-container {
            max-width: 500px;
            margin-top: 50px;
        }

        .card {
            border: none;
            border-radius: 15px;
        }

        .btn-custom {
            background-color: #6366f1;
            color: white;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .btn-custom:hover {
            background-color: #4f46e5;
            color: white;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>

    <h2> Registro de Usuarios</h2>

    <form action="recepcion.php" method="POST">
        <div class="container d-flex justify-content-center">
            <div class="form-container w-100">
                <div class="card shadow-lg p-4">
                    <div class="card-body">
                        <h3 class="text-center mb-4 fw-bold text-dark">Registro de Usuario</h3>

                        <form>
                            <div class="mb-3">
                                <label for="nombre" class="form-label fw-semibold">Nombre</label>
                                <input type="text" class="form-control" id="nombre" placeholder="Ej. Juan" required>
                            </div>

                            <div class="mb-3">
                                <label for="apellido" class="form-label fw-semibold">Apellido</label>
                                <input type="text" class="form-control" id="apellido" placeholder="Ej. Pérez" required>
                            </div>

                            <div class="mb-4">
                                <label for="edad" class="form-label fw-semibold">Edad</label>
                                <input type="number" class="form-control" id="edad" placeholder="00" min="1" max="120"
                                    required>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-custom btn-lg">Enviar Datos</button>
                            </div>
                        </form>

                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@1/dist/js/bootstrap.bundle.min.js"></script>

    </form>
</body>

</html>
